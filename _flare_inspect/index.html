<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- SEO & Branding -->
  <title>Flare | Connect Authentically</title>
  <meta name="description"
    content="Flare Social — แพลตฟอร์มโซเชียลที่ให้คุณแชร์โมเมนต์ ค้นหาเพื่อนใหม่ และเชื่อมต่ออย่างแท้จริง" />
  <meta name="theme-color" content="#0F021A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flare" />

  <!-- Open Graph -->
  <meta property="og:title" content="Flare | Connect Authentically" />
  <meta property="og:description" content="แชร์โมเมนต์ ค้นหาเพื่อนใหม่ เชื่อมต่ออย่างแท้จริง" />
  <meta property="og:type" content="website" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/flare_logo.svg" />
</head>

<body>
  <div id="error-display"
    style="position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.9);color:white;padding:20px;z-index:9999;display:none;">
  </div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      document.getElementById('error-display').style.display = 'block';
      document.getElementById('error-display').innerHTML += '<div>Error: ' + msg + '<br>at ' + url + ':' + line + ':' + col + '</div><hr>';
      return false;
    };
    window.onunhandledrejection = function(event) {
       document.getElementById('error-display').style.display = 'block';
       document.getElementById('error-display').innerHTML += '<div>Unhandled Promise Rejection: ' + event.reason + '</div><hr>';
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
